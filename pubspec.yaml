name: vaulted
description: "Vaulted - Dark luxury fintech gift card wallet"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  firebase_analytics: ^11.5.0
  firebase_crashlytics: ^4.3.0
  firebase_remote_config: ^5.3.0
  cloud_functions: ^5.2.0

  # Auth
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0

  # State / Architecture
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.8.1

  # UI
  fl_chart: ^0.70.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.0
  qr_flutter: ^4.1.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1

  # Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.0
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # WebView (balance checker)
  webview_flutter: ^4.10.0

  # Card Scanning
  mobile_scanner: ^6.0.0

  # Functional Programming
  fpdart: ^1.1.0

  # Utilities
  image_picker: ^1.1.0
  share_plus: ^10.1.0
  url_launcher: ^6.3.2
  intl: ^0.20.2
  timeago: ^3.7.0
  flutter_dotenv: ^5.2.0
  dio: ^5.7.0
  grouped_list: ^6.0.0
  uuid: ^4.5.1

  # Notifications
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-Light.ttf
          weight: 300
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
